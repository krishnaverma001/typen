<!--user/login.html-->

{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h2>Login</h2>
<form method="post" action="{% url 'login' %}" style="max-width: 400px;">
    {% csrf_token %}

    {% if form.errors %}
        <p class="error">Invalid credentials. Please try again.</p>
    {% endif %}

    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}

    <label for="id_username">Username</label><br>
    <input type="text" name="username" id="id_username" placeholder="john doe" required style="width: 100%; padding: 0.5rem; margin-bottom: 1rem;"><br>

    <label for="id_password">Password</label><br>
    <input type="password" name="password" id="id_password" placeholder="********" required style="width: 100%; padding: 0.5rem; margin-bottom: 1.5rem;"><br>

    <button type="submit" style="padding: 0.6rem 1.2rem;">Login</button>
    <p style="margin-top: 1rem;">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
</form>
{% endblock %}
